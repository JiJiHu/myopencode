<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐦 愤怒的小鸟</title>
    <link rel="stylesheet" href="../onepiece-theme.css">
    <!-- Matter.js 物理引擎 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #87CEEB 0%, #98FB98 50%, #F0E68C 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        .close-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #667eea;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: #667eea;
            color: white;
            transform: rotate(90deg);
        }

        .close-btn:hover {
            background: #667eea;
            color: white;
            transform: rotate(90deg);
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 主菜单样式 */
        .menu-screen {
            text-align: center;
            padding: 20px;
        }

        .menu-title {
            font-size: 48px;
            color: #FF4500;
            text-shadow: 3px 3px 0 #FFD700, 6px 6px 0 #8B4513;
            margin-bottom: 20px;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        .menu-subtitle {
            font-size: 24px;
            color: #333;
            margin-bottom: 40px;
        }

        .menu-btn {
            display: block;
            width: 200px;
            padding: 15px 30px;
            margin: 15px auto;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background: linear-gradient(145deg, #FF6347, #FF4500);
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 0 #8B0000, 0 10px 20px rgba(0,0,0,0.3);
        }

        .menu-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 9px 0 #8B0000, 0 15px 25px rgba(0,0,0,0.3);
        }

        .menu-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #8B0000, 0 5px 10px rgba(0,0,0,0.3);
        }

        /* 关卡选择 */
        .level-select {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
            max-width: 600px;
        }

        .level-card {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 3px solid #FF6347;
        }

        .level-card:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .level-card.completed {
            border-color: #FFD700;
        }

        .level-number {
            font-size: 36px;
            font-weight: bold;
            color: #FF4500;
        }

        .level-stars {
            font-size: 20px;
            margin-top: 5px;
        }

        /* 游戏界面 */
        .game-screen {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .game-screen.active {
            display: block;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .game-ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .game-ui > * {
            pointer-events: auto;
        }

        .score-display {
            background: rgba(0,0,0,0.7);
            color: #FFD700;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
        }

        .birds-remaining {
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            display: flex;
            gap: 8px;
        }

        .bird-icon {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            border: 2px solid white;
        }

        .menu-back-btn {
            padding: 8px 16px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
        }
        
        .game-ui {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            gap: 15px;
        }

        .restart-btn {
            background: #FF6347;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .restart-btn:hover {
            background: #FF4500;
            transform: scale(1.05);
        }

        /* 游戏结束弹窗 */
        .game-over-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .game-over-modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.5s ease;
            max-width: 400px;
            width: 90%;
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            font-size: 36px;
            color: #FF4500;
            margin-bottom: 20px;
        }

        .modal-stars {
            font-size: 50px;
            margin: 20px 0;
        }

        .modal-score {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .modal-btn {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-btn.primary {
            background: #FFD700;
            color: #333;
        }

        .modal-btn.primary:hover {
            background: #FFC000;
            transform: scale(1.05);
        }

        .modal-btn.secondary {
            background: #667eea;
            color: white;
        }

        .modal-btn.secondary:hover {
            background: #5568d3;
            transform: scale(1.05);
        }

        /* 隐藏/显示控制 */
        .screen {
            display: none;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        /* 提示文字 */
        .hint-text {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            pointer-events: none;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .menu-title {
                font-size: 32px;
            }

            .level-card {
                width: 90px;
                height: 90px;
            }

            .level-number {
                font-size: 28px;
            }

            .game-ui {
                flex-wrap: wrap;
                gap: 10px;
            }

            .score-display, .birds-remaining {
                font-size: 14px;
                padding: 8px 12px;
            }
        }

        /* 移动端触摸优化 */
        @media (pointer: coarse) {
            #gameCanvas {
                touch-action: none;
                -webkit-touch-callout: none;
                -webkit-user-select: none;
                user-select: none;
            }

            body {
                overscroll-behavior: none;
            }
        }

        /* 提示文字移动端优化 */
        .hint-text {
            text-align: center;
            padding: 10px;
            font-size: 14px;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .hint-text {
                font-size: 12px;
                padding: 5px;
            }
        }

        /* 模态框移动端适配 */
        .modal-content {
            max-width: 90%;
            max-height: 80%;
            overflow-y: auto;
        }

        @media (max-width: 600px) {
            .modal-content {
                padding: 20px;
            }

            .modal-btn {
                padding: 12px 24px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <button class="close-btn" id="closeBtn" onclick="goBackHome()" title="返回主页">×</button>

    <!-- 主菜单 -->
    <div id="menuScreen" class="screen active">
        <div class="menu-screen">
            <h1 class="menu-title">🐦 愤怒的小鸟</h1>
            <p class="menu-subtitle">消灭所有小猪，获得三星评价！</p>
            <button class="menu-btn" onclick="showLevelSelect()">开始游戏</button>
            <button class="menu-btn" onclick="showHowToPlay()">游戏说明</button>
        </div>
    </div>

    <!-- 关卡选择 -->
    <div id="levelScreen" class="screen">
        <h2 style="color: #333; margin-bottom: 30px; font-size: 28px;">选择关卡</h2>
        <div class="level-select" id="levelGrid"></div>
    </div>

    <!-- 游戏界面 -->
    <div id="gameScreen" class="screen">
        <canvas id="gameCanvas"></canvas>
        <div class="game-ui">
            <button class="menu-back-btn" onclick="backToLevelSelect()">← 返回</button>
            <div class="score-display">得分: <span id="scoreValue">0</span></div>
            <div class="birds-remaining" id="birdsDisplay"></div>
            <button class="restart-btn" onclick="restartLevel()">🔄 重新开始</button>
        </div>
        <div class="hint-text" id="hintText">拖拽小鸟发射，消灭所有小猪！</div>
    </div>

    <!-- 游戏结束弹窗 -->
    <div class="game-over-modal" id="gameOverModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">🎉 过关啦！</h2>
            <div class="modal-stars" id="modalStars">⭐⭐⭐</div>
            <p class="modal-score">得分: <span id="finalScore">0</span></p>
            <p style="color: #666; margin-bottom: 20px;" id="modalMessage"></p>
            <div class="modal-buttons">
                <button class="modal-btn secondary" onclick="backToLevelSelect()">返回关卡</button>
                <button class="modal-btn primary" onclick="restartLevel()">再来一局</button>
                <button class="modal-btn primary" onclick="nextLevel()" id="nextLevelBtn">下一关</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>

        // 碰撞类别
        const CATEGORY = {

            }
        };

        // 材料类型
        const MATERIALS = {
            wood: {
                name: '木头',
                color: '#8B4513',

                health: 80,

            },

            }
        };

        // 猪类型
        const PIG_TYPES = {
            small: { name: '小猪', color: '#90EE90', borderColor: '#228B22', radius: 15, health: 50, score: 500 },
            medium: { name: '中猪', color: '#32CD32', borderColor: '#006400', radius: 20, health: 80, score: 1000 },
            large: { name: '大猪', color: '#228B22', borderColor: '#006400', radius: 28, health: 120, score: 2000 }
        };

        // 关卡数据
        const LEVELS = [
            {
                id: 1,
                name: '第一关',
                birds: ['red', 'red', 'yellow', 'blue'],
                pigs: [
                    { type: 'small', x: 600, y: 480 },
                    { type: 'small', x: 650, y: 480 }
                ],
                structures: [
                    { type: 'wood', shape: 'rect', x: 600, y: 520, w: 15, h: 60 },
                    { type: 'wood', shape: 'rect', x: 650, y: 520, w: 15, h: 60 },
                    { type: 'wood', shape: 'rect', x: 625, y: 555, w: 80, h: 15 },
                    { type: 'glass', shape: 'rect', x: 625, y: 500, w: 15, h: 40 }
                ],
                starThresholds: { oneStar: 3000, twoStars: 8000, threeStars: 12000 }
            },
            {
                id: 2,
                name: '第二关',
                birds: ['red', 'yellow', 'blue', 'white', 'black'],
                pigs: [
                    { type: 'small', x: 550, y: 480 },
                    { type: 'medium', x: 650, y: 450 },
                    { type: 'small', x: 700, y: 480 }
                ],
                structures: [
                    // 底层
                    { type: 'stone', shape: 'rect', x: 550, y: 520, w: 15, h: 60 },
                    { type: 'stone', shape: 'rect', x: 700, y: 520, w: 15, h: 60 },
                    { type: 'wood', shape: 'rect', x: 625, y: 555, w: 180, h: 15 },
                    // 中层
                    { type: 'glass', shape: 'rect', x: 580, y: 490, w: 12, h: 50 },
                    { type: 'glass', shape: 'rect', x: 670, y: 490, w: 12, h: 50 },
                    { type: 'wood', shape: 'rect', x: 625, y: 470, w: 120, h: 12 },
                    // 顶层
                    { type: 'wood', shape: 'rect', x: 650, y: 440, w: 15, h: 40 }
                ],
                starThresholds: { oneStar: 5000, twoStars: 12000, threeStars: 20000 }
            },
            {
                id: 3,
                name: '第三关',
                birds: ['red', 'yellow', 'yellow', 'blue', 'white', 'black'],
                pigs: [
                    { type: 'small', x: 500, y: 480 },
                    { type: 'medium', x: 580, y: 420 },
                    { type: 'small', x: 650, y: 480 },
                    { type: 'large', x: 720, y: 450 }
                ],
                structures: [
                    // 左边塔
                    { type: 'wood', shape: 'rect', x: 500, y: 520, w: 15, h: 60 },
                    { type: 'wood', shape: 'rect', x: 540, y: 520, w: 15, h: 60 },
                    { type: 'glass', shape: 'rect', x: 520, y: 555, w: 60, h: 15 },
                    // 中间塔
                    { type: 'stone', shape: 'rect', x: 580, y: 470, w: 18, h: 80 },
                    { type: 'stone', shape: 'rect', x: 620, y: 470, w: 18, h: 80 },
                    { type: 'wood', shape: 'rect', x: 600, y: 430, w: 80, h: 15 },
                    // 右边塔
                    { type: 'wood', shape: 'rect', x: 650, y: 520, w: 15, h: 60 },
                    { type: 'wood', shape: 'rect', x: 690, y: 520, w: 15, h: 60 },
                    { type: 'glass', shape: 'rect', x: 670, y: 555, w: 60, h: 15 },
                    // 顶层
                    { type: 'glass', shape: 'rect', x: 720, y: 490, w: 15, h: 60 },
                    { type: 'glass', shape: 'rect', x: 760, y: 490, w: 15, h: 60 },
                    { type: 'stone', shape: 'rect', x: 740, y: 455, w: 70, h: 15 }
                ],
                starThresholds: { oneStar: 8000, twoStars: 18000, threeStars: 30000 }
            }
        ];

        // ==================== 游戏状态 ====================
        let gameState = 'menu';
        let currentLevel = 0;
        let score = 0;
        let usedBirds = 0;
        let pigsRemaining = 0;
        let birdsQueue = [];
        let currentBird = null;
        let pigs = [];
        let blocks = [];
        let debris = [];
        let isBirdFlying = false;
        let canActivateAbility = false;
        let levelStars = [0, 0, 0];
        let mousePos = { x: 0, y: 0 };

        // Matter.js 变量
        let engine, render, runner, world;
        let slingshot, slingConstraint;
        let ground;
        let mouseConstraint;

        // ==================== 初始化 ====================
        function init() {
            // 检查 Matter.js 是否加载
            if (typeof Matter === 'undefined') {
                alert('❌ 错误：Matter.js 物理引擎未加载！\n\n请检查网络连接，或手动下载并引用本地的 Matter.js 文件。');
                return;
            }

            // 初始化 Matter.js
            const { Engine, Render, Runner, World, Bodies, Body, Composite, Events, Mouse, MouseConstraint, Vector } = Matter;

            engine = Engine.create({
                enableSleeping: CONFIG.enableSleeping,
                gravity: CONFIG.gravity
            });
            world = engine.world;

            // 创建渲染器
            const canvas = document.getElementById('gameCanvas');
            render = Render.create({
                canvas: canvas,
                engine: engine,
                options: {
                    width: CONFIG.canvasWidth,
                    height: CONFIG.canvasHeight,
                    wireframes: false,
                    background: 'transparent'
                }
            });

            // 创建鼠标控制
            const mouse = Mouse.create(canvas);
            mouseConstraint = MouseConstraint.create(engine, {
                mouse: mouse,
                constraint: {
                    stiffness: 0.2,
                    render: { visible: false }
                }
            });

            // 将鼠标约束添加到世界中（关键步骤！）
            Composite.add(world, mouseConstraint);

            // 确保 canvas 可以接收鼠标事件
            canvas.style.cursor = 'pointer';

            // 移动端：添加触摸事件支持
            // Matter.js 的 Mouse 会自动处理触摸事件
            // 但我们需要确保触摸事件能正确传递

            // 鼠标移动事件
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                const scaleX = CONFIG.canvasWidth / rect.width;
                const scaleY = CONFIG.canvasHeight / rect.height;
                mousePos.x = (e.clientX - rect.left) * scaleX;
                mousePos.y = (e.clientY - rect.top) * scaleY;
            });

            // 触摸移动事件（移动端）
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                const scaleX = CONFIG.canvasWidth / rect.width;
                const scaleY = CONFIG.canvasHeight / rect.height;
                mousePos.x = (touch.clientX - rect.left) * scaleX;
                mousePos.y = (touch.clientY - rect.top) * scaleY;
            }, { passive: false });

            // 鼠标释放事件（发射小鸟）
            canvas.addEventListener('mouseup', handleMouseUp);
            canvas.addEventListener('mousedown', handleMouseDown);
            canvas.addEventListener('mousemove', handleMouseMove);
            
            // 触摸事件
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                const scaleX = CONFIG.canvasWidth / rect.width;
                const scaleY = CONFIG.canvasHeight / rect.height;
                mousePos.x = (touch.clientX - rect.left) * scaleX;
                mousePos.y = (touch.clientY - rect.top) * scaleY;
                handleMouseDown(e);
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                const scaleX = CONFIG.canvasWidth / rect.width;
                const scaleY = CONFIG.canvasHeight / rect.height;
                mousePos.x = (touch.clientX - rect.left) * scaleX;
                mousePos.y = (touch.clientY - rect.top) * scaleY;
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                handleMouseUp(e);
            }, { passive: false });
            // 碰撞事件
            Events.on(engine, 'collisionStart', handleCollision);

            // 渲染前事件（自定义绘制）
            Events.on(render, 'beforeRender', beforeRender);
            Events.on(render, 'afterRender', afterRender);

            // 启动引擎和渲染器
            runner = Runner.create();
            Runner.run(runner, engine);
            Render.run(render);

            // 移动端自适应
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // 加载存档
            loadProgress();

            // 显示主菜单
            showMenu();
        }

        // 移动端自适应canvas大小
        function resizeCanvas() {
            const canvas = document.getElementById('gameCanvas');
            const gameScreen = document.getElementById('gameScreen');

            if (window.innerWidth <= 768) {
                // 移动端：调整canvas大小以适应屏幕
                const screenWidth = window.innerWidth;
                const screenHeight = window.innerHeight - 100; // 留出UI空间

                const desiredRatio = CONFIG.canvasWidth / CONFIG.canvasHeight;
                const actualRatio = screenWidth / screenHeight;

                if (actualRatio > desiredRatio) {
                    // 屏幕更宽，以高度为准
                    canvas.style.height = screenHeight + 'px';
                    canvas.style.width = (screenHeight * desiredRatio) + 'px';
                } else {
                    // 屏幕更高，以宽度为准
                    canvas.style.width = screenWidth + 'px';
                    canvas.style.height = (screenWidth / desiredRatio) + 'px';
                }
            } else {
                // 桌面端：保持原始比例
                canvas.style.width = CONFIG.canvasWidth + 'px';
                canvas.style.height = CONFIG.canvasHeight + 'px';
            }

            // 重新创建 mouse 和 mouseConstraint 以匹配新的 canvas 尺寸
            // 只在非游戏状态下重新创建，避免影响正在进行的游戏
            if (world && mouseConstraint && gameState !== 'playing') {
                const { Mouse, MouseConstraint, Composite } = Matter;
                Composite.remove(world, mouseConstraint);

                const mouse = Mouse.create(canvas);
                mouseConstraint = MouseConstraint.create(engine, {
                    mouse: mouse,
                    constraint: {
                        stiffness: 0.2,
                        render: { visible: false }
                    }
                });
                Composite.add(world, mouseConstraint);

                // 重新绑定事件监听器
                canvas.addEventListener('mousedown', handleMouseDown);
                canvas.addEventListener('mouseup', handleMouseUp);
                canvas.addEventListener('mousemove', handleMouseMove);
                canvas.addEventListener('touchstart', (e) => {
                    // 不阻止默认事件，允许拖动
                }, { passive: false });
                canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = CONFIG.canvasWidth / rect.width;
                    const scaleY = CONFIG.canvasHeight / rect.height;
                    mousePos.x = (touch.clientX - rect.left) * scaleX;
                    mousePos.y = (touch.clientY - rect.top) * scaleY;
                }, { passive: false });
                canvas.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    handleMouseUp(e);
                }, { passive: false });
            }
        }

        // ==================== 场景管理 ====================
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            // 游戏界面中隐藏返回主页按钮，避免与得分显示重叠
            const closeBtn = document.getElementById('closeBtn');
            if (screenId === 'gameScreen') {
                closeBtn.style.display = 'none';
            } else {
                closeBtn.style.display = 'flex';
            }
        }

        function showMenu() {
            gameState = 'menu';
            showScreen('menuScreen');
        }

        function showLevelSelect() {
            gameState = 'levelSelect';
            renderLevelGrid();
            showScreen('levelScreen');
        }

        function showGame() {
            gameState = 'playing';
            showScreen('gameScreen');
            document.getElementById('hintText').style.display = 'block';
            setTimeout(() => {
                document.getElementById('hintText').style.display = 'none';
            }, 3000);
        }

        function showHowToPlay() {
            alert('🎮 游戏说明：\n\n1. 拖拽小鸟向后拉动弹弓\n2. 松开发射小鸟\n3. 消灭所有小猪过关\n4. 使用越少小鸟，得分越高\n5. 点击飞行中的小鸟可激活特殊能力\n\n🐦 小鸟能力：\n• 红色：普通小鸟\n• 黄色：点击加速冲刺\n• 蓝色：点击分裂成三只\n• 白色：点击下蛋炸弹\n• 黑色：点击爆炸');
        }

        // 提示显示/隐藏
        function showHint(text) {
            const hint = document.getElementById('hintText');
            hint.textContent = text;
            hint.style.display = 'block';
        }

        function hideHint() {
            document.getElementById('hintText').style.display = 'none';
        }

        // ==================== 关卡系统 ====================
        function renderLevelGrid() {
            const grid = document.getElementById('levelGrid');
            grid.innerHTML = '';

            LEVELS.forEach((level, index) => {
                const card = document.createElement('div');
                card.className = 'level-card' + (levelStars[index] > 0 ? ' completed' : '');
                card.onclick = () => startLevel(index);

                const stars = '⭐'.repeat(levelStars[index]);

                card.innerHTML = `
                    <div class="level-number">${level.id}</div>
                    <div class="level-stars">${stars}</div>
                `;
                grid.appendChild(card);
            });
        }

        function startLevel(levelIndex) {
            currentLevel = levelIndex;
            initLevel(LEVELS[levelIndex]);
            showGame();
        }

        function initLevel(levelData) {
            const { Engine, World, Bodies, Composite, Constraint, Body } = Matter;

            // 清除世界
            Composite.clear(world, false);

            // 重置游戏状态
            score = 0;
            usedBirds = 0;
            isBirdFlying = false;
            canActivateAbility = false;
            pigs = [];
            blocks = [];
            debris = [];
            birdsQueue = [...levelData.birds];

            // 创建地面
            ground = Bodies.rectangle(
                CONFIG.canvasWidth / 2,
                CONFIG.groundY + 25,
                CONFIG.canvasWidth,
                50,
                {
                    isStatic: true,
                    label: 'ground',
                    render: { fillStyle: '#228B22' },
                    collisionFilter: { category: CATEGORY.GROUND }
                }
            );
            Composite.add(world, ground);

            // 创建小猪
            levelData.pigs.forEach(pigData => {
                const pigType = PIG_TYPES[pigData.type];
                const pig = Bodies.circle(pigData.x, pigData.y, pigType.radius, {
                    label: 'pig',
                    render: { fillStyle: pigType.color },
                    collisionFilter: {
                        category: CATEGORY.PIG,
                        mask: CATEGORY.GROUND | CATEGORY.BIRD | CATEGORY.BLOCK | CATEGORY.EGG | CATEGORY.DEBRIS
                    },
                    restitution: 0.3,
                    friction: 0.5
                });
                pig.health = pigType.health;
                pig.pigType = pigType;
                pig.maxHealth = pigType.health;
                pigs.push(pig);
                Composite.add(world, pig);
            });
            pigsRemaining = pigs.length;

            // 创建建筑物
            levelData.structures.forEach(blockData => {
                const material = MATERIALS[blockData.type];
                let block;

                if (blockData.shape === 'rect') {
                    block = Bodies.rectangle(
                        blockData.x,
                        blockData.y,
                        blockData.w,
                        blockData.h,
                        {
                            label: 'block',
                            render: { fillStyle: material.color },
                            collisionFilter: {
                                category: CATEGORY.BLOCK,
                                mask: CATEGORY.GROUND | CATEGORY.BIRD | CATEGORY.BLOCK | CATEGORY.PIG | CATEGORY.EGG | CATEGORY.DEBRIS
                            },
                            mass: material.mass,
                            friction: material.friction,
                            restitution: material.restitution
                        }
                    );
                } else {
                    block = Bodies.circle(blockData.x, blockData.y, blockData.w / 2, {
                        label: 'block',
                        render: { fillStyle: material.color },
                        collisionFilter: {
                            category: CATEGORY.BLOCK,
                            mask: CATEGORY.GROUND | CATEGORY.BIRD | CATEGORY.BLOCK | CATEGORY.PIG | CATEGORY.EGG | CATEGORY.DEBRIS
                        },
                        mass: material.mass,
                        friction: material.friction,
                        restitution: material.restitution
                    });
                }

                block.health = material.health;
                block.maxHealth = material.health;
                block.material = material;
                blocks.push(block);
                Composite.add(world, block);
            });


            // 加载第一只小鸟
            loadNextBird();

            // 更新UI
            updateUI();
        }

        function loadNextBird() {
            const { World, Bodies, Constraint, Body, Composite } = Matter;

            if (birdsQueue.length === 0) {
                // 检查游戏是否结束
                setTimeout(checkGameEnd, 2000);
                return;
            }

            const birdType = birdsQueue.shift();
            const birdData = BIRD_TYPES[birdType];

            // 创建小鸟（临时 static，等玩家拖动时再释放）
            currentBird = Bodies.circle(
                CONFIG.slingshotX,
                CONFIG.slingshotY,
                birdData.radius,
                {
                    label: 'bird',
                    isStatic: true, // 固定小鸟直到被拖动
                    render: {
                        fillStyle: birdData.color,
                        strokeStyle: birdData.borderColor || '#000000',
                        lineWidth: 2
                    },
                    collisionFilter: {
                        category: CATEGORY.BIRD,
                        mask: 0x0001 | CATEGORY.GROUND | CATEGORY.PIG | CATEGORY.BLOCK | CATEGORY.EGG | CATEGORY.DEBRIS
                    },
                    restitution: 0.5,
                    friction: 0.5,
                    density: 0.004,
                    frictionAir: 0.001
                }
            );

            currentBird.birdType = birdType;
            currentBird.birdData = birdData;
            currentBird.originalRadius = birdData.radius;
            currentBird.canActivate = true;
            currentBird.isDraggable = true;
            // 保存弹弓位置作为拖动参考
            currentBird.anchorX = CONFIG.slingshotX;
            currentBird.anchorY = CONFIG.slingshotY;

            Composite.add(world, currentBird);
            
            // 显示提示
            showHint('拖动小鸟发射！');

            // 不立即创建弹弓约束 - 等待拖动时创建
            slingConstraint = null;

            isBirdFlying = false;
            canActivateAbility = false;
        }

        // ==================== 弹弓控制 ====================
        // 拖动状态
        let isDraggingBird = false;
        let dragOffset = { x: 0, y: 0 };
        
        function handleMouseDown(e) {
            e.preventDefault();
            e.stopPropagation();
            
            if (!currentBird || isBirdFlying) return;
            
            const { Vector, Body, Constraint, Composite } = Matter;
            
            // 获取点击/触摸位置
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else if (e.changedTouches && e.changedTouches.length > 0) {
                clientX = e.changedTouches[0].clientX;
                clientY = e.changedTouches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            // 计算画布内的坐标
            const canvas = document.getElementById('gameCanvas');
            const rect = canvas.getBoundingClientRect();
            const displayWidth = parseFloat(canvas.style.width) || rect.width;
            const displayHeight = parseFloat(canvas.style.height) || rect.height;
            const scaleX = CONFIG.canvasWidth / displayWidth;
            const scaleY = CONFIG.canvasHeight / displayHeight;
            
            const clickPos = {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
            
            // 检查是否点击在小鸟附近
            const dist = Vector.magnitude(Vector.sub(clickPos, currentBird.position));
            if (dist > 80) return;
            
            // 释放 static 状态，创建弹弓约束
            Body.setStatic(currentBird, false);
            
            // 保存拖动偏移
            dragOffset = Vector.sub(currentBird.position, clickPos);
            
            // 创建弹弓约束
            slingConstraint = Constraint.create({
                pointA: { x: currentBird.anchorX, y: currentBird.anchorY },
                bodyB: currentBird,
                stiffness: 0.05,
                damping: 0.01,
                length: 0,
                render: { visible: false }
            });
            Composite.add(world, slingConstraint);
            
            isDraggingBird = true;
            hideHint();
        }

        function handleMouseMove(e) {
            if (!isDraggingBird || !currentBird) return;
            e.preventDefault();
            
            const { Vector, Body } = Matter;
            
            // 获取位置
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            const canvas = document.getElementById('gameCanvas');
            const rect = canvas.getBoundingClientRect();
            const displayWidth = parseFloat(canvas.style.width) || rect.width;
            const displayHeight = parseFloat(canvas.style.height) || rect.height;
            const scaleX = CONFIG.canvasWidth / displayWidth;
            const scaleY = CONFIG.canvasHeight / displayHeight;
            
            const mousePos = {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
            
            // 限制拖动范围
            const anchor = { x: currentBird.anchorX, y: currentBird.anchorY };
            let newPos = Vector.add(mousePos, dragOffset);
            const pullVector = Vector.sub(anchor, newPos);
            const pullDist = Vector.magnitude(pullVector);
            
            if (pullDist > CONFIG.maxPullDistance) {
                const normalized = Vector.normalise(pullVector);
                newPos = Vector.sub(anchor, Vector.mult(normalized, CONFIG.maxPullDistance));
            }
            
            Body.setPosition(currentBird, newPos);
            Body.setVelocity(currentBird, { x: 0, y: 0 });
        }

        function handleMouseUp(e) {
            e.preventDefault();
            e.stopPropagation();
            
            // 处理飞行中小鸟的特殊能力激活
            if (currentBird && isBirdFlying && canActivateAbility && currentBird.canActivate) {
                activateBirdAbility();
                return;
            }
            
            if (!currentBird || !isDraggingBird || !slingConstraint) return;
            
            const { Composite, Vector, Body } = Matter;
            isDraggingBird = false;

            // 计算发射向量
            const anchor = { x: currentBird.anchorX, y: currentBird.anchorY };
            const pullVector = Vector.sub(anchor, currentBird.position);
            const pullDistance = Vector.magnitude(pullVector);

            if (pullDistance < 20) {
                // 拉距不够，重置小鸟位置
                Body.setPosition(currentBird, anchor);
                Body.setVelocity(currentBird, { x: 0, y: 0 });
                Body.setStatic(currentBird, true);
                Composite.remove(world, slingConstraint);
                slingConstraint = null;
                return;
            }

            // 移除弹弓约束
            Composite.remove(world, slingConstraint);
            slingConstraint = null;

            // 应用发射力
            const clampedDistance = Math.min(pullDistance, CONFIG.maxPullDistance);
            const force = Vector.mult(Vector.normalise(pullVector), clampedDistance * CONFIG.launchForceMultiplier);
            Body.applyForce(currentBird, currentBird.position, force);

            isBirdFlying = true;
            canActivateAbility = true;
            usedBirds++;

            // 延迟检查小鸟状态
            setTimeout(checkBirdStatus, 500);
        }
        
        function activateBirdAbility() {
            if (!currentBird || !currentBird.canActivate) return;
            
            const { World, Bodies, Composite, Body, Vector } = Matter;
            const birdType = currentBird.birdType;

            currentBird.canActivate = false;
            canActivateAbility = false;

            switch (birdType) {
                case 'yellow':
                    // 加速冲刺
                    const velocity = currentBird.velocity;
                    Body.setVelocity(currentBird, {
                        x: velocity.x * currentBird.birdData.abilityParam,
                        y: velocity.y * currentBird.birdData.abilityParam
                    });
                    break;

                case 'blue':
                    // 分裂成三只
                    const baseVel = currentBird.velocity;
                    const angle = Math.atan2(baseVel.y, baseVel.x);
                    const speed = Vector.magnitude(baseVel);

                    for (let i = -1; i <= 1; i++) {
                        if (i === 0) continue;
                        const newAngle = angle + (i * 0.5);
                        const miniBird = Bodies.circle(
                            currentBird.position.x,
                            currentBird.position.y,
                            8,
                            {
                                label: 'bird',
                                render: { fillStyle: currentBird.birdData.color },
                                collisionFilter: {
                                    category: CATEGORY.BIRD,
                                    mask: CATEGORY.GROUND | CATEGORY.PIG | CATEGORY.BLOCK | CATEGORY.EGG | CATEGORY.DEBRIS
                                },
                                density: 0.002
                            }
                        );
                        Body.setVelocity(miniBird, {
                            x: Math.cos(newAngle) * speed,
                            y: Math.sin(newAngle) * speed
                        });
                        Composite.add(world, miniBird);
                    }
                    Composite.remove(world, currentBird);
                    currentBird = null;
                    break;

                case 'white':
                    // 下蛋炸弹
                    const egg = Bodies.circle(
                        currentBird.position.x,
                        currentBird.position.y + 20,
                        10,
                        {
                            label: 'egg',
                            render: { fillStyle: '#FFD700' },
                            collisionFilter: {
                                category: CATEGORY.EGG,
                                mask: CATEGORY.GROUND | CATEGORY.BLOCK | CATEGORY.PIG
                            },
                            density: 0.008
                        }
                    );
                    Body.setVelocity(egg, {
                        x: currentBird.velocity.x,
                        y: 5
                    });
                    Composite.add(world, egg);
                    break;

                case 'black':
                    // 爆炸
                    const explosionPos = currentBird.position;
                    const explosionRadius = currentBird.birdData.abilityParam;

                    const allBodies = Composite.allBodies(world);
                    allBodies.forEach(body => {
                        if (body.isStatic) return;
                        const dist = Vector.magnitude(Vector.sub(body.position, explosionPos));
                        if (dist < explosionRadius) {
                            const forceMag = (explosionRadius - dist) * 0.5;
                            const dir = Vector.normalise(Vector.sub(body.position, explosionPos));
                            Body.applyForce(body, body.position, Vector.mult(dir, forceMag));
                            if (body.label === 'pig') {
                                body.health -= 50;
                            }
                        }
                    });

                    createExplosionEffect(explosionPos);
                    Composite.remove(world, currentBird);
                    currentBird = null;
                    break;
            }

            setTimeout(() => {
                if (gameState === 'playing') {
                    loadNextBird();
                }
            }, 1500);
        }

        function createExplosionEffect(pos) {
            // 简化的爆炸效果 - 创建一些碎片
            for (let i = 0; i < 8; i++) {
                const { Bodies, Composite, Body } = Matter;
                const debris = Bodies.circle(
                    pos.x + (Math.random() - 0.5) * 30,
                    pos.y + (Math.random() - 0.5) * 30,
                    3 + Math.random() * 5,
                    {
                        label: 'debris',
                        render: { fillStyle: '#FF4500' },
                        collisionFilter: { category: CATEGORY.DEBRIS }
                    }
                );
                Body.setVelocity(debris, {
                    x: (Math.random() - 0.5) * 15,
                    y: (Math.random() - 0.5) * 15
                });
                Composite.add(world, debris);
            }
        }

        function checkBirdStatus() {
            if (!currentBird) return;

            const { Body } = Matter;
            const speed = Math.sqrt(currentBird.velocity.x ** 2 + currentBird.velocity.y ** 2);

            if (speed < 0.5) {
                // 小鸟停止，移除并加载下一只
                Composite.remove(world, currentBird);
                currentBird = null;
                setTimeout(() => {
                    if (gameState === 'playing') {
                        loadNextBird();
                    }
                }, 500);
            } else {
                // 继续检查
                setTimeout(checkBirdStatus, 500);
            }
        }

        function checkGameEnd() {
            if (pigsRemaining === 0) {
                // 胜利
                showGameOver(true);
            } else if (birdsQueue.length === 0 && !currentBird) {
                // 失败
                showGameOver(false);
            }
        }

        // ==================== 碰撞处理 ====================
        function handleCollision(event) {
            const { Vector, Composite, Body } = Matter;

            event.pairs.forEach(pair => {
                const bodyA = pair.bodyA;
                const bodyB = pair.bodyB;

                // 计算碰撞力度
                const relVel = Vector.sub(bodyA.velocity, bodyB.velocity);
                const impactSpeed = Vector.magnitude(relVel);

                if (impactSpeed < CONFIG.damageThreshold) return;

                // 处理小猪受伤
                [bodyA, bodyB].forEach(body => {
                    if (body.label === 'pig' && body.health !== undefined) {
                        const damage = (impactSpeed - CONFIG.damageThreshold) * CONFIG.damageMultiplier;
                        body.health -= damage;

                        if (body.health <= 0) {
                            // 小猪死亡
                            removePig(body);
                        }
                    }

                    // 处理建筑物受伤
                    if (body.label === 'block' && body.health !== undefined) {
                        const damage = (impactSpeed - CONFIG.damageThreshold) * CONFIG.damageMultiplier;
                        body.health -= damage;

                        if (body.health <= 0) {
                            // 方块销毁
                            removeBlock(body);
                        }
                    }
                });
            });
        }

        function removePig(pig) {
            const { Composite, Bodies, Body, Vector } = Matter;

            // 从数组中移除
            const index = pigs.indexOf(pig);
            if (index > -1) {
                pigs.splice(index, 1);
                pigsRemaining--;
                score += pig.pigType.score;
            }

            // 创建碎片效果
            for (let i = 0; i < 5; i++) {
                const piece = Bodies.circle(
                    pig.position.x + (Math.random() - 0.5) * 20,
                    pig.position.y + (Math.random() - 0.5) * 20,
                    4,
                    {
                        render: { fillStyle: pig.pigType.color },
                        collisionFilter: { category: CATEGORY.DEBRIS }
                    }
                );
                Body.setVelocity(piece, {
                    x: (Math.random() - 0.5) * 8,
                    y: (Math.random() - 0.5) * 8 - 3
                });
                Composite.add(world, piece);
            }

            // 移除小猪
            Composite.remove(world, pig);

            updateUI();

            // 检查是否全部消灭
            if (pigsRemaining === 0) {
                setTimeout(() => showGameOver(true), 1000);
            }
        }

        function removeBlock(block) {
            const { Composite, Bodies, Body } = Matter;

            // 从数组中移除
            const index = blocks.indexOf(block);
            if (index > -1) {
                blocks.splice(index, 1);
                score += block.material.score;
            }

            // 创建碎片
            for (let i = 0; i < 3; i++) {
                const piece = Bodies.rectangle(
                    block.position.x + (Math.random() - 0.5) * 20,
                    block.position.y + (Math.random() - 0.5) * 20,
                    8,
                    8,
                    {
                        render: { fillStyle: block.material.color },
                        collisionFilter: { category: CATEGORY.DEBRIS }
                    }
                );
                Body.setVelocity(piece, {
                    x: (Math.random() - 0.5) * 6,
                    y: (Math.random() - 0.5) * 6 - 2
                });
                Composite.add(world, piece);
            }

            // 移除方块
            Composite.remove(world, block);

            updateUI();
        }

        // ==================== 渲染 ====================
        function beforeRender() {
            const ctx = render.context;
            const { Vector } = Matter;

            // 绘制背景
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, CONFIG.canvasWidth, 200);

            // 绘制草地
            ctx.fillStyle = '#90EE90';
            ctx.fillRect(0, CONFIG.groundY, CONFIG.canvasWidth, CONFIG.canvasHeight - CONFIG.groundY);
        }

        function afterRender() {
            const ctx = render.context;
            const { Vector } = Matter;

            // 绘制弹弓
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(CONFIG.slingshotX - 8, CONFIG.slingshotY - 60, 16, 80);

            // 绘制弹弓皮筋
            if (currentBird && (slingConstraint || isDraggingBird)) {
                const anchorX = currentBird.anchorX || CONFIG.slingshotX;
                const anchorY = currentBird.anchorY || CONFIG.slingshotY;
                ctx.beginPath();
                ctx.moveTo(anchorX - 8, anchorY - 40);
                ctx.lineTo(currentBird.position.x, currentBird.position.y);
                ctx.lineTo(anchorX + 8, anchorY - 40);
                ctx.strokeStyle = '#8B0000';
                ctx.lineWidth = 4;
                ctx.stroke();
            }

            // 绘制轨迹预览
            if (currentBird && isDraggingBird && !isBirdFlying) {
                drawTrajectory(ctx);
            }

            // 绘制小鸟
            if (currentBird) {
                drawBird(ctx, currentBird);
            }

            // 绘制小猪
            pigs.forEach(pig => {
                drawPig(ctx, pig);
            });

            // 绘制方块
            blocks.forEach(block => {
                drawBlock(ctx, block);
            });
        }

        function drawBird(ctx, bird) {
            const { birdType, birdData } = bird;

            ctx.beginPath();
            ctx.arc(bird.position.x, bird.position.y, birdData.radius, 0, Math.PI * 2);
            ctx.fillStyle = birdData.color;
            ctx.fill();
            ctx.strokeStyle = birdData.borderColor;
            ctx.lineWidth = 3;
            ctx.stroke();

            // 绘制眼睛
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(bird.position.x + 5, bird.position.y - 3, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(bird.position.x + 7, bird.position.y - 3, 2, 0, Math.PI * 2);
            ctx.fill();

            // 绘制眉毛（愤怒表情）
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(bird.position.x - 2, bird.position.y - 10);
            ctx.lineTo(bird.position.x + 5, bird.position.y - 8);
            ctx.stroke();

            // 绘制喙
            ctx.fillStyle = '#FFA500';
            ctx.beginPath();
            ctx.moveTo(bird.position.x + 10, bird.position.y + 2);
            ctx.lineTo(bird.position.x + 18, bird.position.y + 5);
            ctx.lineTo(bird.position.x + 10, bird.position.y + 8);
            ctx.closePath();
            ctx.fill();
        }

        function drawPig(ctx, pig) {
            const { pigType, health, maxHealth } = pig;

            ctx.beginPath();
            ctx.arc(pig.position.x, pig.position.y, pigType.radius, 0, Math.PI * 2);
            ctx.fillStyle = pigType.color;
            ctx.fill();
            ctx.strokeStyle = pigType.borderColor;
            ctx.lineWidth = 3;
            ctx.stroke();

            // 绘制眼睛
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(pig.position.x - 6, pig.position.y - 4, 5, 0, Math.PI * 2);
            ctx.arc(pig.position.x + 6, pig.position.y - 4, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(pig.position.x - 5, pig.position.y - 3, 2, 0, Math.PI * 2);
            ctx.arc(pig.position.x + 7, pig.position.y - 3, 2, 0, Math.PI * 2);
            ctx.fill();

            // 绘制鼻子
            ctx.fillStyle = '#90EE90';
            ctx.beginPath();
            ctx.ellipse(pig.position.x, pig.position.y + 4, 6, 4, 0, 0, Math.PI * 2);
            ctx.fill();

            // 绘制耳朵
            ctx.fillStyle = pigType.color;
            ctx.beginPath();
            ctx.ellipse(pig.position.x - 10, pig.position.y - 12, 4, 6, -0.3, 0, Math.PI * 2);
            ctx.ellipse(pig.position.x + 10, pig.position.y - 12, 4, 6, 0.3, 0, Math.PI * 2);
            ctx.fill();

            // 血量指示
            if (health < maxHealth) {
                const healthPercent = health / maxHealth;
                ctx.fillStyle = 'red';
                ctx.fillRect(pig.position.x - 15, pig.position.y - pigType.radius - 10, 30, 4);
                ctx.fillStyle = '#00FF00';
                ctx.fillRect(pig.position.x - 15, pig.position.y - pigType.radius - 10, 30 * healthPercent, 4);
            }
        }

        function drawBlock(ctx, block) {
            const { material, health, maxHealth, vertices } = block;

            ctx.beginPath();
            ctx.moveTo(vertices[0].x, vertices[0].y);
            for (let i = 1; i < vertices.length; i++) {
                ctx.lineTo(vertices[i].x, vertices[i].y);
            }
            ctx.closePath();
            ctx.fillStyle = material.color;
            ctx.fill();
            ctx.strokeStyle = material.borderColor;
            ctx.lineWidth = 2;
            ctx.stroke();

            // 损坏效果
            if (health < maxHealth * 0.7) {
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 1;
                for (let i = 0; i < 3; i++) {
                    const x = block.position.x + (Math.random() - 0.5) * 30;
                    const y = block.position.y + (Math.random() - 0.5) * 30;
                    ctx.beginPath();
                    ctx.moveTo(x - 5, y - 5);
                    ctx.lineTo(x + 5, y + 5);
                    ctx.moveTo(x + 5, y - 5);
                    ctx.lineTo(x - 5, y + 5);
                    ctx.stroke();
                }
            }
        }

        function drawTrajectory(ctx) {
            if (!currentBird || !isDraggingBird) return;
            
            const { Vector } = Matter;

            const anchor = { x: currentBird.anchorX, y: currentBird.anchorY };
            const pullVector = Vector.sub(anchor, currentBird.position);
            const pullDistance = Math.min(Vector.magnitude(pullVector), CONFIG.maxPullDistance);

            if (pullDistance < 15) return;

            // 计算发射速度
            const direction = Vector.normalise(pullVector);
            const force = pullDistance * CONFIG.launchForceMultiplier;
            const velocity = Vector.mult(direction, force * 800);
            
            // 物理参数
            const gravity = CONFIG.gravity.y * 800;
            const dt = 0.016;

            // 绘制轨迹
            let x = currentBird.position.x;
            let y = currentBird.position.y;
            let vx = velocity.x;
            let vy = velocity.y;
            
            ctx.lineWidth = 3;
            let prevX = x, prevY = y;
            
            for (let t = 0; t < 60; t++) {
                // 物理模拟
                x += vx * dt;
                y += vy * dt;
                vy += gravity * dt;
                
                // 到达地面或边界
                if (y > CONFIG.groundY - 15 || x > CONFIG.canvasWidth - 10 || x < 10) break;
                
                const alpha = 1 - t / 60;
                const size = 4 + (1 - alpha) * 2;
                
                // 轨迹点
                ctx.fillStyle = `rgba(255,200,0,${alpha})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
                
                // 连接线
                if (t > 0) {
                    ctx.strokeStyle = `rgba(255,200,0,${alpha * 0.5})`;
                    ctx.beginPath();
                    ctx.moveTo(prevX, prevY);
                    ctx.lineTo(x, y);
                    ctx.stroke();
                }
                
                prevX = x;
                prevY = y;
            }
        }

        // ==================== UI 更新 ====================
        function updateUI() {
            document.getElementById('scoreValue').textContent = score;

            // 显示剩余小鸟
            const birdsDisplay = document.getElementById('birdsDisplay');
            let birdIcons = '';

            // 已使用的
            for (let i = 0; i < usedBirds; i++) {
                birdIcons += '<div class="bird-icon" style="background: #888;"></div>';
            }

            // 当前小鸟
            if (currentBird) {
                birdIcons += `<div class="bird-icon" style="background: ${currentBird.birdData.color}; border-color: ${currentBird.birdData.borderColor};"></div>`;
            }

            // 待使用
            birdsQueue.forEach(type => {
                birdIcons += `<div class="bird-icon" style="background: ${BIRD_TYPES[type].color}; border-color: ${BIRD_TYPES[type].borderColor};"></div>`;
            });

            birdsDisplay.innerHTML = birdIcons;
        }

        // ==================== 游戏结束 ====================
        function showGameOver(won) {
            const level = LEVELS[currentLevel];
            const thresholds = level.starThresholds;

            let stars = 0;
            if (won) {
                // 计算星级
                if (score >= thresholds.threeStars) stars = 3;
                else if (score >= thresholds.twoStars) stars = 2;
                else if (score >= thresholds.oneStar) stars = 1;

                // 保存进度
                if (stars > levelStars[currentLevel]) {
                    levelStars[currentLevel] = stars;
                    saveProgress();
                }
            }

            // 显示弹窗
            const modal = document.getElementById('gameOverModal');
            document.getElementById('modalTitle').textContent = won ? '🎉 过关啦！' : '💔 游戏结束';
            document.getElementById('modalStars').textContent = won ? '⭐'.repeat(stars) : '💔';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('modalMessage').textContent = won
                ? `使用 ${usedBirds} 只小鸟，获得 ${stars} 星评价！`
                : '小猪还没有全部消灭，再试一次吧！';

            // 下一关按钮
            const nextBtn = document.getElementById('nextLevelBtn');
            nextBtn.style.display = (won && currentLevel < LEVELS.length - 1) ? 'block' : 'none';

            modal.classList.add('active');
        }

        function hideGameOver() {
            document.getElementById('gameOverModal').classList.remove('active');
        }

        function restartLevel() {
            hideGameOver();
            startLevel(currentLevel);
        }

        function backToLevelSelect() {
            hideGameOver();
            showLevelSelect();
        }

        function nextLevel() {
            hideGameOver();
            if (currentLevel < LEVELS.length - 1) {
                startLevel(currentLevel + 1);
            }
        }

        // ==================== 数据持久化 ====================
        function saveProgress() {
            localStorage.setItem('angryBirdsStars', JSON.stringify(levelStars));
        }

        function loadProgress() {
            const saved = localStorage.getItem('angryBirdsStars');
            if (saved) {
                levelStars = JSON.parse(saved);
            }
        }

        // ==================== 工具函数 ====================
        function goBackHome() {
            hideGameOver();
            gameState = 'menu';
            showMenu();
            window.location.href = '../../index.html';
        }

        // ==================== 启动游戏 ====================
        window.onload = init;
    </script>
</body>

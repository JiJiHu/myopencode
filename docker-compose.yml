version: '3.8'

services:
  mygame:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mygame
    ports:
      - "11278:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>👊 拳皇格斗</title>
    <link rel="stylesheet" href="../onepiece-theme.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        .close-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #e94560;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            color: #e94560;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: #e94560;
            color: white;
            transform: rotate(90deg);
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 游戏头部 - HP和计时器 */
        .game-head {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .hp-bar {
            width: 40%;
            height: 30px;
            background: #333;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            border: 2px solid #fff;
        }

        .hp-bar .hp-inner {
            height: 100%;
            transition: width 0.3s ease;
        }

        .hp-bar.p0 .hp-inner {
            background: linear-gradient(90deg, #00ff88, #00cc6a);
        }

        .hp-bar.p1 .hp-inner {
            background: linear-gradient(90deg, #ff4757, #ff6b7a);
        }

        .hp-bar .hp-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            font-size: 14px;
        }

        .timer {
            width: 80px;
            height: 60px;
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #ffd700;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700;
        }

        /* 游戏画布 */
        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 控制说明 */
        .controls-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            z-index: 100;
        }

        .controls-info .p1 {
            color: #00ff88;
            font-weight: bold;
        }

        .controls-info .p2 {
            color: #ff4757;
            font-weight: bold;
        }

        /* 游戏结束弹窗 */
        .game-over-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .game-over-modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            border: 3px solid #ffd700;
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            font-size: 48px;
            color: #ffd700;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ffd700;
        }

        .modal-winner {
            font-size: 28px;
            color: white;
            margin-bottom: 30px;
        }

        .modal-btn {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
        }

        .modal-btn.restart {
            background: #ffd700;
            color: #1a1a2e;
        }

        .modal-btn.restart:hover {
            background: #ffed4a;
            transform: scale(1.05);
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .controls-info {
                font-size: 11px;
                padding: 10px 15px;
            }

            .hp-bar {
                height: 20px;
            }

            .timer {
                width: 50px;
                height: 40px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <button class="close-btn" onclick="goBack()">×</button>

    <div class="game-container">
        <div class="game-head">
            <div class="hp-bar p0">
                <div class="hp-inner" id="hp0" style="width: 100%"></div>
                <span class="hp-text" id="hpText0">P1: 100</span>
            </div>
            <div class="timer" id="timer">60</div>
            <div class="hp-bar p1">
                <div class="hp-inner" id="hp1" style="width: 100%"></div>
                <span class="hp-text" id="hpText1">P2: 100</span>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="controls-info">
            <span class="p1">P1: W跳跃 A左 D右 空格攻击</span>
            &nbsp;&nbsp;|&nbsp;&nbsp;
            <span class="p2">P2: ↑跳跃 ←左 →右 回车攻击</span>
        </div>
    </div>

    <div class="game-over-modal" id="gameOverModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">游戏结束</h2>
            <p class="modal-winner" id="modalWinner"></p>
            <button class="modal-btn restart" onclick="restartGame()">再来一局</button>
        </div>
    </div>

    <script>
        // ==================== 游戏配置 ====================
        const CONFIG = {
            canvasWidth: 1200,
            canvasHeight: 700,
            groundY: 550,
            gravity: 0.8,
            
            // 玩家属性
            playerWidth: 60,
            playerHeight: 120,
            moveSpeed: 8,
            jumpForce: -18,
            
            // 攻击参数
            attackRange: 80,
            attackDamage: 15,
            attackCooldown: 500,
            
            // 动画
            frameRate: 60
        };

        // ==================== 游戏状态 ====================
        let canvas, ctx;
        let players = [];
        let gameRunning = false;
        let timeLeft = 60;
        let lastTime = 0;

        // 按键状态
        const keys = {};

        // 玩家类
        class Player {
            constructor(id, x, color, name, facingRight) {
                this.id = id;
                this.x = x;
                this.y = CONFIG.groundY - CONFIG.playerHeight;
                this.width = CONFIG.playerWidth;
                this.height = CONFIG.playerHeight;
                this.color = color;
                this.name = name;
                
                // 状态
                this.vx = 0;
                this.vy = 0;
                this.hp = 100;
                this.isGrounded = true;
                this.isAttacking = false;
                this.attackFrame = 0;
                this.lastAttackTime = 0;
                this.isHit = false;
                this.hitFrame = 0;
                this.isDead = false;
                
                // 方向 (1 = 右, -1 = 左)
                this.facingRight = facingRight;
                
                // 动画
                this.animFrame = 0;
                this.animTimer = 0;
            }

            update() {
                if (this.isDead) return;

                // 处理受击
                if (this.isHit) {
                    this.hitFrame++;
                    if (this.hitFrame > 15) {
                        this.isHit = false;
                        this.hitFrame = 0;
                    }
                    return;
                }

                // 处理攻击
                if (this.isAttacking) {
                    this.attackFrame++;
                    if (this.attackFrame > 20) {
                        this.isAttacking = false;
                        this.attackFrame = 0;
                    }
                    return;
                }

                // 应用重力
                this.vy += CONFIG.gravity;
                this.y += this.vy;
                this.x += this.vx;

                // 地面检测
                if (this.y >= CONFIG.groundY - this.height) {
                    this.y = CONFIG.groundY - this.height;
                    this.vy = 0;
                    this.isGrounded = true;
                } else {
                    this.isGrounded = false;
                }

                // 边界检测
                if (this.x < 0) this.x = 0;
                if (this.x > CONFIG.canvasWidth - this.width) this.x = CONFIG.canvasWidth - this.width;

                // 动画
                this.animTimer++;
                if (this.animTimer > 5) {
                    this.animTimer = 0;
                    this.animFrame = (this.animFrame + 1) % 4;
                }
            }

            render(ctx) {
                ctx.save();
                
                const drawX = this.x;
                const drawY = this.y;

                // 受击闪烁
                if (this.isHit && this.hitFrame % 4 < 2) {
                    ctx.globalAlpha = 0.5;
                }

                // 绘制身体
                ctx.fillStyle = this.color;
                
                // 身体主体
                ctx.fillRect(drawX, drawY + 20, this.width, this.height - 20);
                
                // 头部
                ctx.beginPath();
                ctx.arc(drawX + this.width / 2, drawY + 15, 20, 0, Math.PI * 2);
                ctx.fill();
                
                // 眼睛 - 根据朝向
                ctx.fillStyle = 'white';
                const eyeOffset = this.facingRight > 0 ? 5 : -5;
                ctx.beginPath();
                ctx.arc(drawX + this.width / 2 + eyeOffset, drawY + 12, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(drawX + this.width / 2 + eyeOffset + (this.facingRight > 0 ? 2 : -2), drawY + 12, 3, 0, Math.PI * 2);
                ctx.fill();

                // 腿部动画
                ctx.fillStyle = this.color;
                if (!this.isGrounded) {
                    // 跳跃 - 腿收起来
                    ctx.fillRect(drawX + 10, drawY + this.height - 10, 15, 15);
                    ctx.fillRect(drawX + 35, drawY + this.height - 10, 15, 15);
                } else if (this.vx !== 0) {
                    // 行走动画
                    const legOffset = Math.sin(this.animFrame * Math.PI / 2) * 10;
                    ctx.fillRect(drawX + 10 + legOffset, drawY + this.height - 10, 15, 15);
                    ctx.fillRect(drawX + 35 - legOffset, drawY + this.height - 10, 15, 15);
                } else {
                    // 站立
                    ctx.fillRect(drawX + 10, drawY + this.height - 10, 15, 15);
                    ctx.fillRect(drawX + 35, drawY + this.height - 10, 15, 15);
                }

                // 攻击效果
                if (this.isAttacking) {
                    ctx.fillStyle = '#ffd700';
                    const attackX = this.facingRight > 0 ? drawX + this.width : drawX - CONFIG.attackRange;
                    ctx.globalAlpha = 0.7;
                    ctx.fillRect(attackX, drawY + 40, CONFIG.attackRange, 30);
                    ctx.globalAlpha = 1;
                }

                ctx.restore();
            }

            attack() {
                const now = Date.now();
                if (now - this.lastAttackTime < CONFIG.attackCooldown) return;
                
                this.isAttacking = true;
                this.attackFrame = 0;
                this.lastAttackTime = now;

                // 检测攻击命中
                const opponent = players[1 - this.id];
                if (opponent && !opponent.isDead) {
                    const attackX = this.facingRight > 0 ? this.x + this.width : this.x - CONFIG.attackRange;
                    const attackRect = {
                        x1: attackX,
                        y1: this.y + 40,
                        x2: attackX + CONFIG.attackRange,
                        y2: this.y + 70
                    };
                    const playerRect = {
                        x1: opponent.x,
                        y1: opponent.y,
                        x2: opponent.x + opponent.width,
                        y2: opponent.y + opponent.height
                    };

                    if (this.checkCollision(attackRect, playerRect)) {
                        opponent.takeDamage(CONFIG.attackDamage);
                    }
                }
            }

            takeDamage(damage) {
                if (this.isHit || this.isDead) return;
                
                this.hp = Math.max(0, this.hp - damage);
                this.isHit = true;
                this.hitFrame = 0;
                
                // 后退
                const opponent = players[1 - this.id];
                if (opponent) {
                    this.vx = opponent.facingRight > 0 ? -10 : 10;
                    setTimeout(() => this.vx = 0, 200);
                }

                // 更新HP显示
                this.updateHPDisplay();

                if (this.hp <= 0) {
                    this.isDead = true;
                    checkGameOver();
                }
            }

            updateHPDisplay() {
                const hpBar = document.getElementById(`hp${this.id}`);
                const hpText = document.getElementById(`hpText${this.id}`);
                hpBar.style.width = this.hp + '%';
                hpText.textContent = `${this.name}: ${this.hp}`;
            }

            checkCollision(r1, r2) {
                return !(r1.x2 < r2.x1 || r1.x1 > r2.x2 || r1.y2 < r2.y1 || r1.y1 > r2.y2);
            }
        }

        // ==================== 初始化 ====================
        function init() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // 键盘事件
            document.addEventListener('keydown', (e) => {
                keys[e.key] = true;
                keys[e.code] = true;
            });
            document.addEventListener('keyup', (e) => {
                keys[e.key] = false;
                keys[e.code] = false;
            });

            startGame();
        }

        function resizeCanvas() {
            const container = document.querySelector('.game-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            CONFIG.canvasWidth = canvas.width;
            CONFIG.canvasHeight = canvas.height;
            CONFIG.groundY = canvas.height - 100;
        }

        // ==================== 游戏逻辑 ====================
        function startGame() {
            players = [
                new Player(0, 200, '#00ff88', 'P1', true),
                new Player(1, CONFIG.canvasWidth - 260, '#ff4757', 'P2', false)
            ];
            
            timeLeft = 60;
            gameRunning = true;
            
            document.getElementById('gameOverModal').classList.remove('active');
            updateTimer();
            
            requestAnimationFrame(gameLoop);
            
            // 倒计时
            const timerInterval = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(timerInterval);
                    return;
                }
                timeLeft--;
                updateTimer();
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    checkGameOver();
                }
            }, 1000);
        }

        function updateTimer() {
            document.getElementById('timer').textContent = timeLeft;
        }

        function handleInput() {
            if (!gameRunning) return;

            const p0 = players[0];
            const p1 = players[1];

            // 玩家1: W A D 空格
            if (!p0.isDead && !p0.isHit && !p0.isAttacking) {
                p0.vx = 0;
                if (keys['a'] || keys['A']) {
                    p0.vx = -CONFIG.moveSpeed;
                    p0.facingRight = false;
                } else if (keys['d'] || keys['D']) {
                    p0.vx = CONFIG.moveSpeed;
                    p0.facingRight = true;
                }
                
                if ((keys['w'] || keys['W']) && p0.isGrounded) {
                    p0.vy = CONFIG.jumpForce;
                    p0.isGrounded = false;
                }
                
                if (keys[' '] || keys['Space']) {
                    p0.attack();
                }
            }

            // 玩家2: 方向键 回车
            if (!p1.isDead && !p1.isHit && !p1.isAttacking) {
                p1.vx = 0;
                if (keys['ArrowLeft']) {
                    p1.vx = -CONFIG.moveSpeed;
                    p1.facingRight = false;
                } else if (keys['ArrowRight']) {
                    p1.vx = CONFIG.moveSpeed;
                    p1.facingRight = true;
                }
                
                if (keys['ArrowUp'] && p1.isGrounded) {
                    p1.vy = CONFIG.jumpForce;
                    p1.isGrounded = false;
                }
                
                if (keys['Enter']) {
                    p1.attack();
                }
            }

            // 玩家面向对手
            if (!p0.isDead && !p1.isDead) {
                p0.facingRight = p0.x < p1.x;
                p1.facingRight = p0.x < p1.x;
            }
        }

        function gameLoop(timestamp) {
            if (!gameRunning) return;

            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            // 处理输入
            handleInput();

            // 更新玩家
            players.forEach(p => p.update());

            // 渲染
            render();

            requestAnimationFrame(gameLoop);
        }

        function render() {
            // 清空画布
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制背景 - 城市夜景
            drawBackground();

            // 绘制地面
            ctx.fillStyle = '#2d2d44';
            ctx.fillRect(0, CONFIG.groundY, canvas.width, canvas.height - CONFIG.groundY);
            
            // 地面线条
            ctx.strokeStyle = '#4a4a6a';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, CONFIG.groundY);
            ctx.lineTo(canvas.width, CONFIG.groundY);
            ctx.stroke();

            // 绘制玩家
            // 先绘制血量少的，确保在前面
            const sortedPlayers = [...players].sort((a, b) => a.hp - b.hp);
            sortedPlayers.forEach(p => p.render(ctx));
        }

        function drawBackground() {
            // 天空渐变
            const gradient = ctx.createLinearGradient(0, 0, 0, CONFIG.groundY);
            gradient.addColorStop(0, '#0f0f23');
            gradient.addColorStop(1, '#1a1a3e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, CONFIG.groundY);

            // 月亮
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(100, 80, 40, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#0f0f23';
            ctx.beginPath();
            ctx.arc(110, 75, 35, 0, Math.PI * 2);
            ctx.fill();

            // 星星
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 50; i++) {
                const x = (i * 137) % canvas.width;
                const y = (i * 89) % (CONFIG.groundY - 150);
                const size = (i % 3) + 1;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }

            // 建筑剪影
            ctx.fillStyle = '#0a0a15';
            const buildings = [
                { x: 50, w: 80, h: 200 },
                { x: 150, w: 60, h: 150 },
                { x: 230, w: 100, h: 250 },
                { x: 350, w: 70, h: 180 },
                { x: 450, w: 90, h: 220 },
                { x: 560, w: 60, h: 160 },
                { x: 640, w: 110, h: 280 },
                { x: 770, w: 80, h: 190 },
                { x: 870, w: 70, h: 210 },
                { x: 960, w: 100, h: 170 },
                { x: 1080, w: 80, h: 230 }
            ];
            
            buildings.forEach(b => {
                ctx.fillRect(b.x, CONFIG.groundY - b.h, b.w, b.h);
                
                // 窗户
                ctx.fillStyle = '#ffff00';
                for (let wy = CONFIG.groundY - b.h + 20; wy < CONFIG.groundY - 20; wy += 30) {
                    for (let wx = b.x + 10; wx < b.x + b.w - 10; wx += 20) {
                        if (Math.random() > 0.3) {
                            ctx.fillRect(wx, wy, 8, 12);
                        }
                    }
                }
                ctx.fillStyle = '#0a0a15';
            });
        }

        function checkGameOver() {
            const p0 = players[0];
            const p1 = players[1];
            
            let winner = null;
            
            if (p0.isDead) {
                winner = 'P2 获胜!';
            } else if (p1.isDead) {
                winner = 'P1 获胜!';
            } else if (timeLeft <= 0) {
                if (p0.hp > p1.hp) {
                    winner = 'P1 获胜! (血量)';
                } else if (p1.hp > p0.hp) {
                    winner = 'P2 获胜! (血量)';
                } else {
                    winner = '平局!';
                }
            }
            
            if (winner) {
                gameRunning = false;
                document.getElementById('modalTitle').textContent = '游戏结束';
                document.getElementById('modalWinner').textContent = winner;
                document.getElementById('gameOverModal').classList.add('active');
            }
        }

        function restartGame() {
            startGame();
        }

        function goBack() {
            window.location.href = '../../index.html';
        }

        // 启动游戏
        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐦 愤怒的小鸟</title>
    <link rel="stylesheet" href="../onepiece-theme.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #87CEEB 0%, #98FB98 50%, #F0E68C 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        .close-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #667eea;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: #667eea;
            color: white;
            transform: rotate(90deg);
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 主菜单样式 */
        .menu-screen {
            text-align: center;
            padding: 20px;
        }

        .menu-title {
            font-size: 48px;
            color: #FF4500;
            text-shadow: 3px 3px 0 #FFD700, 6px 6px 0 #8B4513;
            margin-bottom: 20px;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        .menu-subtitle {
            font-size: 24px;
            color: #333;
            margin-bottom: 40px;
        }

        .menu-btn {
            display: block;
            width: 200px;
            padding: 15px 30px;
            margin: 15px auto;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background: linear-gradient(145deg, #FF6347, #FF4500);
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 0 #8B0000, 0 10px 20px rgba(0,0,0,0.3);
        }

        .menu-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 9px 0 #8B0000, 0 15px 25px rgba(0,0,0,0.3);
        }

        /* 关卡选择 */
        .level-select {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
            max-width: 600px;
        }

        .level-card {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 3px solid #FF6347;
        }

        .level-card:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .level-card.completed {
            border-color: #FFD700;
        }

        .level-number {
            font-size: 36px;
            font-weight: bold;
            color: #FF4500;
        }

        .level-stars {
            font-size: 20px;
            margin-top: 5px;
        }

        /* 游戏界面 */
        .game-screen {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .game-screen.active {
            display: block;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .game-ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .game-ui > * {
            pointer-events: auto;
        }

        .score-display {
            background: rgba(0,0,0,0.7);
            color: #FFD700;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
        }

        .birds-remaining {
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            display: flex;
            gap: 8px;
        }

        .bird-icon {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            border: 2px solid white;
        }

        .menu-back-btn {
            padding: 8px 16px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
        }
        
        .game-ui {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            gap: 15px;
        }

        .restart-btn {
            background: #FF6347;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .restart-btn:hover {
            background: #FF4500;
            transform: scale(1.05);
        }

        /* 游戏结束弹窗 */
        .game-over-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .game-over-modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.5s ease;
            max-width: 400px;
            width: 90%;
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            font-size: 36px;
            color: #FF4500;
            margin-bottom: 20px;
        }

        .modal-stars {
            font-size: 50px;
            margin: 20px 0;
        }

        .modal-score {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .modal-btn {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-btn.primary {
            background: #FFD700;
            color: #333;
        }

        .modal-btn.primary:hover {
            background: #FFC000;
            transform: scale(1.05);
        }

        .modal-btn.secondary {
            background: #667eea;
            color: white;
        }

        .modal-btn.secondary:hover {
            background: #5568d3;
            transform: scale(1.05);
        }

        /* 隐藏/显示控制 */
        .screen {
            display: none;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        /* 提示文字 */
        .hint-text {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            pointer-events: none;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .menu-title {
                font-size: 32px;
            }

            .level-card {
                width: 90px;
                height: 90px;
            }

            .level-number {
                font-size: 28px;
            }

            .game-ui {
                flex-wrap: wrap;
                gap: 10px;
            }

            .score-display, .birds-remaining {
                font-size: 14px;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <button class="close-btn" id="closeBtn" onclick="goBackHome()">×</button>

    <!-- 主菜单 -->
    <div id="menuScreen" class="screen active">
        <div class="menu-screen">
            <h1 class="menu-title">🐦 愤怒的小鸟</h1>
            <p class="menu-subtitle">消灭所有小猪，获得三星评价！</p>
            <button class="menu-btn" onclick="showLevelSelect()">开始游戏</button>
            <button class="menu-btn" onclick="showHowToPlay()">游戏说明</button>
        </div>
    </div>

    <!-- 关卡选择 -->
    <div id="levelScreen" class="screen">
        <h2 style="color: #333; margin-bottom: 30px; font-size: 28px;">选择关卡</h2>
        <div class="level-select" id="levelGrid"></div>
    </div>

    <!-- 游戏界面 -->
    <div id="gameScreen" class="screen">
        <canvas id="gameCanvas"></canvas>
        <div class="game-ui">
            <button class="menu-back-btn" onclick="backToLevelSelect()">← 返回</button>
            <div class="score-display">得分: <span id="scoreValue">0</span></div>
            <div class="birds-remaining" id="birdsDisplay"></div>
            <button class="restart-btn" onclick="restartLevel()">🔄 重新开始</button>
        </div>
        <div class="hint-text" id="hintText">拖动小鸟发射，消灭所有小猪！</div>
    </div>

    <!-- 游戏结束弹窗 -->
    <div class="game-over-modal" id="gameOverModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">🎉 过关啦！</h2>
            <div class="modal-stars" id="modalStars">⭐⭐⭐</div>
            <p class="modal-score">得分: <span id="finalScore">0</span></p>
            <p style="color: #666; margin-bottom: 20px;" id="modalMessage"></p>
            <div class="modal-buttons">
                <button class="modal-btn secondary" onclick="backToLevelSelect()">返回关卡</button>
                <button class="modal-btn primary" onclick="restartLevel()">再来一局</button>
                <button class="modal-btn primary" onclick="nextLevel()" id="nextLevelBtn">下一关</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        // ========== Matter.js 模块 ==========
        const { Engine, Render, Runner, World, Bodies, Body, Composite, Events, Mouse, MouseConstraint, Constraint, Vector } = Matter;

        // ========== 游戏配置 ==========
        const CONFIG = {
            gravity: { x: 0, y: 1 },
            slingshotX: 150,
            slingshotY: 450,
            maxPullDistance: 120,
            launchForceMultiplier: 0.045,
            birdRadius: 15,
            groundY: 550,
            canvasWidth: 900,
            canvasHeight: 600,
            damageThreshold: 3,
            damageMultiplier: 8
        };

        const CATEGORY = {
            GROUND: 0x0001,
            BIRD: 0x0002,
            PIG: 0x0004,
            BLOCK: 0x0008
        };

        // 小鸟类型
        const BIRD_TYPES = ['red', 'yellow', 'blue'];
        const BIRD_COLORS = {
            red: '#FF0000',
            yellow: '#FFD700',
            blue: '#00BFFF'
        };

        // 猪类型
        const PIG_TYPES = {
            small: { color: '#90EE90', radius: 15, health: 50 }
        };

        // 关卡数据
        const LEVELS = [
            {
                id: 1,
                pigs: [{ type: 'small', x: 600, y: 480 }, { type: 'small', x: 650, y: 480 }],
                blocks: [
                    { type: 'wood', x: 600, y: 520, w: 15, h: 60 },
                    { type: 'wood', x: 650, y: 520, w: 15, h: 60 },
                    { type: 'wood', x: 625, y: 555, w: 80, h: 15 }
                ]
            },
            {
                id: 2,
                pigs: [
                    { type: 'small', x: 550, y: 480 },
                    { type: 'small', x: 650, y: 450 },
                    { type: 'small', x: 700, y: 480 }
                ],
                blocks: [
                    { type: 'stone', x: 550, y: 520, w: 15, h: 60 },
                    { type: 'stone', x: 700, y: 520, w: 15, h: 60 },
                    { type: 'wood', x: 625, y: 555, w: 180, h: 15 }
                ]
            }
        ];

        // ========== 游戏状态 ==========
        let engine, render, runner, world;
        let currentLevel = 0;
        let score = 0;
        let birdsQueue = [];
        let currentBird = null;
        let slingConstraint = null;
        let pigs = [];
        let blocks = [];
        let firingMode = false;
        let levelStars = [0, 0];

        // ========== 初始化 ==========
        function init() {
            engine = Engine.create({ gravity: CONFIG.gravity });
            world = engine.world;

            const canvas = document.getElementById('gameCanvas');
            render = Render.create({
                canvas: canvas,
                engine: engine,
                options: {
                    width: CONFIG.canvasWidth,
                    height: CONFIG.canvasHeight,
                    wireframes: false,
                    background: 'transparent'
                }
            });

            // 鼠标控制
            const mouse = Mouse.create(canvas);
            const mouseConstraint = MouseConstraint.create(engine, {
                mouse: mouse,
                constraint: { render: { visible: false } }
            });
            render.mouse = mouse;

            // 监听拖动结束事件 - 释放小鸟时移除约束，让它飞向目标
            let lastFiringCheck = 0;
            
            Events.on(mouseConstraint, 'enddrag', function(e) {
                if (e.body === currentBird && slingConstraint) {
                    // 移除弹弓约束，让小鸟自由飞行
                    World.remove(world, slingConstraint);
                    slingConstraint = null;
                    
                    firingMode = true;
                    lastFiringCheck = Date.now();
                }
            });

            // 检查小鸟状态 (参考 emjose/slingshot)
            Events.on(engine, 'afterUpdate', function() {
                if (!currentBird) return;
                
                // 检测小鸟飞出边界
                if (currentBird.position.y > CONFIG.canvasHeight + 100 ||
                    currentBird.position.x < -100 ||
                    currentBird.position.x > CONFIG.canvasWidth + 100) {
                    // 小鸟飞出屏幕，加载下一只
                    if (firingMode) {
                        loadNextBird();
                    }
                    return;
                }
                
                if (!firingMode) return;
                
                // 至少等待1秒后再检测，让小鸟有时间飞出去攻击
                if (Date.now() - lastFiringCheck < 1000) return;
                
                // 计算小鸟速度
                const speed = currentBird.velocity ? 
                    Math.sqrt(currentBird.velocity.x ** 2 + currentBird.velocity.y ** 2) : 0;
                
                // 小鸟已经静止或非常慢
                if (speed < 0.5) {
                    loadNextBird();
                }
            });

            World.add(world, mouseConstraint);

            // 碰撞检测 - 检测小鸟和猪的碰撞
            Events.on(engine, 'collisionStart', function(event) {
                event.pairs.forEach(pair => {
                    const bodyA = pair.bodyA;
                    const bodyB = pair.bodyB;
                    
                    // 检测小鸟撞猪
                    if ((bodyA.label === 'bird' && bodyB.label === 'pig') || 
                        (bodyB.label === 'bird' && bodyA.label === 'pig')) {
                        const bird = bodyA.label === 'bird' ? bodyA : bodyB;
                        const pig = bodyA.label === 'pig' ? bodyA : bodyB;
                        
                        // 计算碰撞速度
                        const speed = Math.sqrt(bird.velocity.x ** 2 + bird.velocity.y ** 2);
                        
                        // 速度大于3才造成伤害
                        if (speed > 3) {
                            removePig(pig);
                        }
                    }
                    
                    // 检测猪是否掉出屏幕或撞到地面
                    if (bodyA.label === 'pig') checkPigOut(bodyA);
                    if (bodyB.label === 'pig') checkPigOut(bodyB);
                });
            });

            function checkPigOut(pig) {
                // 猪掉出屏幕底部或左右边界
                if (pig.position.y > CONFIG.canvasHeight ||
                    pig.position.x < -50 || 
                    pig.position.x > CONFIG.canvasWidth + 50) {
                    removePig(pig);
                }
            }

            // 渲染背景
            Events.on(render, 'beforeRender', function() {
                const ctx = render.context;
                ctx.fillStyle = '#87CEEB';
                ctx.fillRect(0, 0, CONFIG.canvasWidth, 200);
                ctx.fillStyle = '#90EE90';
                ctx.fillRect(0, CONFIG.groundY, CONFIG.canvasWidth, CONFIG.canvasHeight - CONFIG.groundY);
            });

            // 绘制弹弓
            Events.on(render, 'afterRender', function() {
                const ctx = render.context;
                if (currentBird) {
                    // 弹弓
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(CONFIG.slingshotX - 8, CONFIG.slingshotY - 60, 16, 80);
                    
                    // 皮筋
                    ctx.beginPath();
                    ctx.moveTo(CONFIG.slingshotX - 8, CONFIG.slingshotY - 40);
                    ctx.lineTo(currentBird.position.x, currentBird.position.y);
                    ctx.lineTo(CONFIG.slingshotX + 8, CONFIG.slingshotY - 40);
                    ctx.strokeStyle = '#8B0000';
                    ctx.lineWidth = 4;
                    ctx.stroke();
                }
            });

            runner = Runner.create();
            Runner.run(runner, engine);
            Render.run(render);

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            showMenu();
        }

        function resizeCanvas() {
            const canvas = document.getElementById('gameCanvas');
            const container = document.querySelector('.game-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            CONFIG.canvasWidth = canvas.width;
            CONFIG.canvasHeight = canvas.height;
            CONFIG.groundY = canvas.height - 80;
        }

        // ========== 场景管理 ==========
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            const closeBtn = document.getElementById('closeBtn');
            if (screenId === 'gameScreen') {
                closeBtn.style.display = 'none';
            } else {
                closeBtn.style.display = 'flex';
            }
        }

        function showMenu() { showScreen('menuScreen'); }
        function showLevelSelect() { renderLevelGrid(); showScreen('levelScreen'); }
        function showGame() { showScreen('gameScreen'); }

        function showHowToPlay() {
            alert('🎮 游戏说明：\n\n1. 拖拽小鸟向后拉动弹弓\n2. 松开发射小鸟\n3. 消灭所有小猪过关');
        }

        // ========== 关卡系统 ==========
        function renderLevelGrid() {
            const grid = document.getElementById('levelGrid');
            grid.innerHTML = '';
            LEVELS.forEach((level, index) => {
                const card = document.createElement('div');
                card.className = 'level-card';
                card.onclick = () => startLevel(index);
                card.innerHTML = `
                    <div class="level-number">${level.id}</div>
                    <div class="level-stars">${'⭐'.repeat(levelStars[index])}</div>
                `;
                grid.appendChild(card);
            });
        }

        function startLevel(levelIndex) {
            currentLevel = levelIndex;
            initLevel(LEVELS[levelIndex]);
            showGame();
        }

        function initLevel(levelData) {
            Composite.clear(world);
            
            score = 0;
            isFiring = false;
            pigs = [];
            blocks = [];
            birdsQueue = [...levelData.pigs.length > 2 ? ['red','red','red'] : ['red','red']];

            // 地面
            const ground = Bodies.rectangle(
                CONFIG.canvasWidth / 2,
                CONFIG.groundY + 25,
                CONFIG.canvasWidth,
                50,
                { isStatic: true, render: { fillStyle: '#228B22' } }
            );
            World.add(world, ground);

            // 小猪
            levelData.pigs.forEach(pigData => {
                const pigType = PIG_TYPES[pigData.type];
                const pig = Bodies.circle(pigData.x, pigData.y, pigType.radius, {
                    label: 'pig',
                    render: { fillStyle: pigType.color },
                    collisionFilter: { category: CATEGORY.PIG }
                });
                pig.health = pigType.health;
                pigs.push(pig);
                World.add(world, pig);
            });

            // 建筑物
            const MATERIALS = {
                wood: { color: '#8B4513', health: 80 },
                stone: { color: '#808080', health: 200 }
            };
            
            levelData.blocks.forEach(blockData => {
                const material = MATERIALS[blockData.type];
                const block = Bodies.rectangle(blockData.x, blockData.y, blockData.w, blockData.h, {
                    label: 'block',
                    render: { fillStyle: material.color },
                    collisionFilter: { category: CATEGORY.BLOCK }
                });
                block.health = material.health;
                blocks.push(block);
                World.add(world, block);
            });

            loadNextBird();
            updateUI();
        }

        function loadNextBird() {
            // 移除旧的小鸟和约束
            if (currentBird) World.remove(world, currentBird);
            if (slingConstraint) World.remove(world, slingConstraint);
            
            // 重置发射状态
            firingMode = false;

            if (birdsQueue.length === 0) {
                setTimeout(() => checkGameEnd(), 2000);
                return;
            }

            const birdColor = BIRD_COLORS[birdsQueue.shift()];
            
            // 创建小鸟
            currentBird = Bodies.circle(
                CONFIG.slingshotX,
                CONFIG.slingshotY,
                CONFIG.birdRadius,
                {
                    label: 'bird',
                    render: { fillStyle: birdColor, strokeStyle: '#000', lineWidth: 2 },
                    restitution: 0.5,
                    density: 0.004
                }
            );
            World.add(world, currentBird);

            // 创建弹弓约束 (参考 emjose/slingshot 的方式)
            slingConstraint = Constraint.create({
                pointA: { x: CONFIG.slingshotX, y: CONFIG.slingshotY },
                bodyB: currentBird,
                stiffness: 0.05,  // 关键：让约束有弹性
                length: 0,
                render: { visible: false }
            });
            World.add(world, slingConstraint);

            updateUI();
        }

        function removePig(pig) {
            const index = pigs.indexOf(pig);
            if (index > -1) {
                pigs.splice(index, 1);
                score += 500;
                World.remove(world, pig);
                updateUI();
                
                if (pigs.length === 0) {
                    setTimeout(() => showGameOver(true), 1000);
                }
            }
        }

        function checkGameEnd() {
            if (pigs.length === 0) {
                showGameOver(true);
            } else {
                showGameOver(false);
            }
        }

        // ========== UI ==========
        function updateUI() {
            document.getElementById('scoreValue').textContent = score;
            
            let html = '';
            for (let i = 0; i < birdsQueue.length; i++) {
                html += `<div class="bird-icon" style="background: ${BIRD_COLORS[birdsQueue[i]]}"></div>`;
            }
            document.getElementById('birdsDisplay').innerHTML = html;
        }

        function showGameOver(won) {
            const stars = won ? 3 : 0;
            document.getElementById('modalTitle').textContent = won ? '🎉 过关啦！' : '💔 游戏结束';
            document.getElementById('modalStars').textContent = won ? '⭐⭐⭐' : '💔';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverModal').classList.add('active');
            
            if (won && stars > levelStars[currentLevel]) {
                levelStars[currentLevel] = stars;
            }
        }

        function restartLevel() {
            document.getElementById('gameOverModal').classList.remove('active');
            startLevel(currentLevel);
        }

        function backToLevelSelect() {
            document.getElementById('gameOverModal').classList.remove('active');
            showLevelSelect();
        }

        function nextLevel() {
            if (currentLevel < LEVELS.length - 1) {
                document.getElementById('gameOverModal').classList.remove('active');
                startLevel(currentLevel + 1);
            }
        }

        function goBackHome() {
            document.getElementById('gameOverModal').classList.remove('active');
            showMenu();
            window.location.href = '../../index.html';
        }

        // 启动
        window.onload = init;
    </script>
</body>
</html>
